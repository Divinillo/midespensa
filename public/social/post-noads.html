<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>MiDespensa No Ads</title>
</head>
<body style="margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#0a0a0a;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">

  <!-- Teal accent glow -->
  <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(13,148,136,0.08) 0%,transparent 70%);"></div>

  <!-- Subtle grid lines -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;"></div>

  <!-- Content -->
  <div style="position:relative;z-index:2;text-align:center;padding:80px;width:100%;box-sizing:border-box;">

    <!-- Logo -->
    <div style="margin-bottom:60px;">
      <span style="font-size:22px;font-weight:700;color:rgba(13,148,136,0.6);letter-spacing:1px;">MiDespensa</span>
    </div>

    <!-- Crossed-out icons -->
    <div style="display:flex;align-items:center;justify-content:center;gap:60px;margin-bottom:60px;">
      <!-- Crossed out eye -->
      <div style="position:relative;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:28px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.06);">
        <span style="font-size:56px;">👁️</span>
        <div style="position:absolute;top:50%;left:50%;width:110px;height:4px;background:#ef4444;border-radius:2px;transform:translate(-50%,-50%) rotate(-45deg);"></div>
      </div>

      <!-- Crossed out AD -->
      <div style="position:relative;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:28px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.06);">
        <span style="font-size:36px;font-weight:900;color:rgba(255,255,255,0.5);">AD</span>
        <div style="position:absolute;top:50%;left:50%;width:110px;height:4px;background:#ef4444;border-radius:2px;transform:translate(-50%,-50%) rotate(-45deg);"></div>
      </div>

      <!-- Crossed out cookie -->
      <div style="position:relative;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:28px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.06);">
        <span style="font-size:56px;">🍪</span>
        <div style="position:absolute;top:50%;left:50%;width:110px;height:4px;background:#ef4444;border-radius:2px;transform:translate(-50%,-50%) rotate(-45deg);"></div>
      </div>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 40px 0;font-size:72px;font-weight:900;color:#ffffff;line-height:1.1;letter-spacing:-2px;">
      No ads. No tracking.<br>Just cooking.
    </h1>

    <!-- Teal accent line -->
    <div style="width:60px;height:4px;background:#0d9488;border-radius:2px;margin:0 auto 40px auto;"></div>

    <!-- Subtext -->
    <p style="margin:0 0 80px 0;font-size:32px;font-weight:600;color:rgba(255,255,255,0.5);line-height:1.4;">
      Your data stays yours. Always.
    </p>

    <!-- Bottom -->
    <div style="display:inline-flex;align-items:center;gap:12px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#0d9488;"></div>
      <span style="font-size:18px;font-weight:600;color:rgba(13,148,136,0.6);">midespensa.app</span>
    </div>
  </div>

</body>
</html>
