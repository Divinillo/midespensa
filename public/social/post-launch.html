<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>MiDespensa Launch</title>
</head>
<body style="margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d9488 0%,#134e4a 60%,#0f766e 100%);position:relative;display:flex;align-items:center;justify-content:center;">

  <!-- Geometric shapes -->
  <div style="position:absolute;top:-80px;right:-80px;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
  <div style="position:absolute;bottom:-120px;left:-60px;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,0.04);"></div>
  <div style="position:absolute;top:200px;left:-100px;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,0.03);"></div>
  <div style="position:absolute;bottom:150px;right:60px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>
  <div style="position:absolute;top:80px;left:180px;width:60px;height:60px;border-radius:12px;background:rgba(255,255,255,0.08);transform:rotate(45deg);"></div>
  <div style="position:absolute;bottom:280px;right:200px;width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.07);transform:rotate(30deg);"></div>
  <div style="position:absolute;top:400px;right:80px;width:80px;height:80px;border-radius:16px;background:rgba(255,255,255,0.05);transform:rotate(15deg);"></div>

  <!-- Content -->
  <div style="position:relative;z-index:2;text-align:center;padding:80px;">

    <!-- Logo -->
    <div style="margin-bottom:60px;">
      <span style="font-size:28px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;">Introducing</span>
    </div>

    <!-- Main headline -->
    <h1 style="margin:0 0 30px 0;font-size:82px;font-weight:900;color:#ffffff;line-height:1.05;letter-spacing:-2px;">
      Your kitchen<br>just got<br>smarter
    </h1>

    <!-- Subtext -->
    <p style="margin:0 0 50px 0;font-size:30px;font-weight:600;color:rgba(240,253,250,0.8);line-height:1.4;">
      MiDespensa — AI-powered meal planning
    </p>

    <!-- CTA Badge -->
    <div style="display:inline-block;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.3);border-radius:60px;padding:20px 50px;">
      <span style="font-size:26px;font-weight:800;color:#ffffff;letter-spacing:0.5px;">Try free for 7 days</span>
    </div>

    <!-- Bottom branding -->
    <div style="margin-top:80px;">
      <div style="font-size:36px;font-weight:900;color:#ffffff;letter-spacing:-0.5px;">MiDespensa</div>
      <div style="font-size:18px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:8px;">midespensa.app</div>
    </div>
  </div>

</body>
</html>
