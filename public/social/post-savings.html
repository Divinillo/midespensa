<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>MiDespensa Savings</title>
</head>
<body style="margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f1724 100%);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">

  <!-- Gold accent glow -->
  <div style="position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,0.08) 0%,transparent 70%);"></div>
  <div style="position:absolute;bottom:10%;right:10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,0.05) 0%,transparent 70%);"></div>

  <!-- Content -->
  <div style="position:relative;z-index:2;text-align:center;padding:80px;width:100%;box-sizing:border-box;">

    <!-- Logo -->
    <div style="margin-bottom:50px;">
      <span style="font-size:22px;font-weight:700;color:rgba(245,158,11,0.6);letter-spacing:1px;">MiDespensa</span>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 60px 0;font-size:66px;font-weight:900;color:#ffffff;line-height:1.1;letter-spacing:-2px;">
      Stop wasting food.<br>Start saving money.
    </h1>

    <!-- Big stat -->
    <div style="display:inline-block;margin-bottom:20px;">
      <div style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:3px;margin-bottom:16px;">Families waste</div>
      <div style="font-size:120px;font-weight:900;color:#f59e0b;line-height:1;letter-spacing:-4px;">
        $1,500
      </div>
      <div style="font-size:26px;font-weight:700;color:rgba(245,158,11,0.7);margin-top:12px;">/year on unused groceries</div>
    </div>

    <!-- Divider -->
    <div style="width:60px;height:3px;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:2px;margin:50px auto 50px auto;"></div>

    <!-- Description -->
    <p style="margin:0 auto;max-width:700px;font-size:30px;font-weight:600;color:rgba(255,255,255,0.7);line-height:1.4;">
      MiDespensa tracks everything<br>so nothing goes to waste
    </p>

    <!-- Bottom -->
    <div style="margin-top:60px;">
      <div style="display:inline-block;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:40px;padding:14px 36px;">
        <span style="font-size:18px;font-weight:600;color:rgba(245,158,11,0.8);">midespensa.app</span>
      </div>
    </div>
  </div>

</body>
</html>
