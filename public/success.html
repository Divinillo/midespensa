<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activando MiDespensa...</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #166534; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #4b5563; font-size: 0.95rem; line-height: 1.6; margin-bottom: 0.75rem; }
    .badge {
      display: inline-block;
      padding: 0.25rem 1rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .badge.pro   { background:#dcfce7; color:#166534; }
    .badge.ultra { background:#f3e8ff; color:#7e22ce; }
    .spinner {
      width: 2rem; height: 2rem;
      border: 3px solid #e5e7eb;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 1rem;
    }
    .progress-fill {
      height: 100%;
      background: #16a34a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .error { color: #dc2626; font-size: 0.85rem; margin-top: 1rem; }
    .btn {
      display: inline-block;
      background: #16a34a;
      color: white;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      font-weight: 600;
      margin-top: 1rem;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      width: 100%;
    }
    .btn.ultra { background: #7e22ce; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Activando tu suscripción...</h1>
  <div class="badge pro" id="badge" style="display:none"></div>
  <p id="msg">Estamos configurando tu cuenta, solo un momento.</p>
  <div class="spinner" id="spinner"></div>
  <div class="progress-bar"><div class="progress-fill" id="bar" style="width:10%"></div></div>
  <p class="error" id="err" style="display:none"></p>
  <button class="btn" id="btnGo" style="display:none" onclick="window.location.href='./index.html'">
    Ir a MiDespensa →
  </button>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');
const tier      = params.get('tier') || 'pro';

const icon    = document.getElementById('icon');
const title   = document.getElementById('title');
const badge   = document.getElementById('badge');
const msg     = document.getElementById('msg');
const spinner = document.getElementById('spinner');
const bar     = document.getElementById('bar');
const errEl   = document.getElementById('err');
const btnGo   = document.getElementById('btnGo');

function setProgress(pct) { bar.style.width = pct + '%'; }

function showSuccess(tierLabel) {
  icon.textContent = '🎉';
  title.textContent = '¡Todo listo!';
  badge.textContent = tierLabel;
  badge.className = 'badge ' + (tier === 'ultra' ? 'ultra' : 'pro');
  badge.style.display = 'inline-block';
  msg.textContent = 'Tu suscripción está activa. Ya puedes usar MiDespensa al completo.';
  spinner.style.display = 'none';
  bar.style.width = '100%';
  bar.style.background = tier === 'ultra' ? '#7e22ce' : '#16a34a';
  btnGo.style.display = 'block';
  if (tier === 'ultra') btnGo.classList.add('ultra');
  // Redirigir automáticamente en 2 segundos
  setTimeout(() => { window.location.href = './index.html?activated=1'; }, 2000);
}

function showError(text) {
  spinner.style.display = 'none';
  errEl.textContent = text;
  errEl.style.display = 'block';
  btnGo.style.display = 'block';
  btnGo.textContent = 'Ir a MiDespensa';
}

async function activate() {
  if (!sessionId) { showError('No se encontró la sesión de pago. Contacta con soporte.'); return; }

  setProgress(30);

  try {
    // 1. Obtener clave y email desde Stripe/Supabase
    const res = await fetch(`/api/get-license?session_id=${encodeURIComponent(sessionId)}`);
    const data = await res.json();

    if (!data.ok) {
      // El webhook puede tardar 1-2 segundos — reintentamos una vez
      await new Promise(r => setTimeout(r, 2000));
      setProgress(50);
      const res2 = await fetch(`/api/get-license?session_id=${encodeURIComponent(sessionId)}`);
      const data2 = await res2.json();
      if (!data2.ok) { showError('La licencia está siendo procesada. Revisa tu email en unos minutos.'); return; }
      Object.assign(data, data2);
    }

    setProgress(90);

    // 3. Mostrar éxito
    const label = data.tier === 'ultra' ? 'Ultra Chef ✨' : 'Pro ✨';
    showSuccess(label);

  } catch(e) {
    console.error(e);
    showError('Error de conexión. Inténtalo de nuevo o contacta con soporte.');
  }
}

activate();
</script>
</body>
</html>
