<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>MiDespensa Meal Planner</title>
</head>
<body style="margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:linear-gradient(160deg,#134e4a 0%,#0f3d3a 50%,#0c312f 100%);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">

  <!-- Subtle glow -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(13,148,136,0.15) 0%,transparent 70%);"></div>

  <!-- Content -->
  <div style="position:relative;z-index:2;text-align:center;padding:60px;width:100%;box-sizing:border-box;">

    <!-- Logo -->
    <div style="margin-bottom:30px;">
      <span style="font-size:22px;font-weight:700;color:rgba(240,253,250,0.5);letter-spacing:1px;">MiDespensa</span>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 40px 0;font-size:64px;font-weight:900;color:#ffffff;line-height:1.1;letter-spacing:-2px;">
      A whole month of meals<br>in 30 seconds
    </h1>

    <!-- Calendar Grid -->
    <div style="display:inline-block;background:rgba(255,255,255,0.06);border-radius:24px;padding:24px;margin-bottom:40px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);">
      <!-- Days header -->
      <div style="display:grid;grid-template-columns:repeat(7,100px);gap:6px;margin-bottom:8px;">
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">MON</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">TUE</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">WED</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">THU</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">FRI</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">SAT</div>
        <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);padding:8px 0;">SUN</div>
      </div>
      <!-- Week 1 -->
      <div style="display:grid;grid-template-columns:repeat(7,100px);gap:6px;margin-bottom:6px;">
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🥗</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍝</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🌮</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍛</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🐟</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍕</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🥘</div>
      </div>
      <!-- Week 2 -->
      <div style="display:grid;grid-template-columns:repeat(7,100px);gap:6px;margin-bottom:6px;">
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍜</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🥩</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍲</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🥙</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍣</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🍔</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🥑</div>
      </div>
      <!-- Week 3 -->
      <div style="display:grid;grid-template-columns:repeat(7,100px);gap:6px;">
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🍗</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🥦</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🧆</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🍱</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🌯</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.25);display:flex;align-items:center;justify-content:center;font-size:32px;">🥐</div>
        <div style="height:80px;border-radius:12px;background:rgba(13,148,136,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;">🍳</div>
      </div>
    </div>

    <!-- Subtext -->
    <p style="margin:0 0 0 0;font-size:26px;font-weight:600;color:rgba(240,253,250,0.7);line-height:1.4;">
      AI plans your meals based on what you actually have
    </p>

    <!-- Bottom -->
    <div style="margin-top:30px;">
      <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,0.3);">midespensa.app</span>
    </div>
  </div>

</body>
</html>
