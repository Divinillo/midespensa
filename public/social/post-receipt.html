<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>MiDespensa Receipt Scanner</title>
</head>
<body style="margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;background:#ffffff;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;">

  <!-- Top teal accent bar -->
  <div style="position:absolute;top:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#0d9488,#14b8a6);"></div>

  <!-- Subtle background pattern -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 80%,rgba(13,148,136,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(13,148,136,0.03) 0%,transparent 50%);"></div>

  <!-- Content -->
  <div style="position:relative;z-index:2;text-align:center;padding:80px;width:100%;box-sizing:border-box;">

    <!-- Logo top -->
    <div style="margin-bottom:50px;">
      <span style="font-size:22px;font-weight:700;color:#0d9488;letter-spacing:1px;">MiDespensa</span>
    </div>

    <!-- Title -->
    <h1 style="margin:0 0 60px 0;font-size:80px;font-weight:900;color:#134e4a;line-height:1.05;letter-spacing:-2px;">
      Scan. Organize.<br>Done.
    </h1>

    <!-- 3 Steps -->
    <div style="display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:60px;">
      <!-- Step 1 -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:160px;height:160px;border-radius:32px;background:linear-gradient(135deg,#f0fdfa,#ccfbf1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(13,148,136,0.1);">
          <span style="font-size:72px;">📷</span>
        </div>
        <span style="font-size:20px;font-weight:700;color:#134e4a;">Snap</span>
      </div>

      <!-- Arrow -->
      <div style="font-size:40px;color:#0d9488;font-weight:900;margin-top:-30px;">→</div>

      <!-- Step 2 -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:160px;height:160px;border-radius:32px;background:linear-gradient(135deg,#f0fdfa,#ccfbf1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(13,148,136,0.1);">
          <span style="font-size:72px;">🗂️</span>
        </div>
        <span style="font-size:20px;font-weight:700;color:#134e4a;">Organize</span>
      </div>

      <!-- Arrow -->
      <div style="font-size:40px;color:#0d9488;font-weight:900;margin-top:-30px;">→</div>

      <!-- Step 3 -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:160px;height:160px;border-radius:32px;background:linear-gradient(135deg,#f0fdfa,#ccfbf1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(13,148,136,0.1);">
          <span style="font-size:72px;">✅</span>
        </div>
        <span style="font-size:20px;font-weight:700;color:#134e4a;">Done</span>
      </div>
    </div>

    <!-- Description -->
    <p style="margin:0 auto 60px auto;max-width:750px;font-size:28px;font-weight:600;color:#475569;line-height:1.5;">
      Snap a photo of your grocery receipt and your pantry updates automatically
    </p>

    <!-- Bottom accent line -->
    <div style="width:80px;height:4px;background:#0d9488;border-radius:2px;margin:0 auto 20px auto;"></div>
    <div style="font-size:18px;font-weight:400;color:#94a3b8;">midespensa.app</div>
  </div>

</body>
</html>
