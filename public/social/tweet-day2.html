<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tweet Day 2 - Food Waste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px;
  height: 675px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}
.card {
  width: 1200px;
  height: 675px;
  background: linear-gradient(160deg, #1a0a00 0%, #451a03 50%, #1a0a00 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px 70px;
}
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  left: 20%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
  border-radius: 50%;
}
.left {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.stat {
  font-size: 110px;
  font-weight: 900;
  color: #fbbf24;
  letter-spacing: -0.04em;
  line-height: 1;
}
.stat-label {
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  line-height: 1.3;
  max-width: 460px;
}
.stat-label em {
  color: #fbbf24;
  font-style: normal;
}
.right {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 24px;
  text-align: right;
}
.solution {
  font-size: 32px;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
  max-width: 420px;
}
.solution em {
  color: #2dd4bf;
  font-style: normal;
}
.cta {
  background: #fff;
  color: #134e4a;
  font-size: 22px;
  font-weight: 800;
  padding: 16px 36px;
  border-radius: 14px;
}
.url {
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
}
.divider {
  width: 3px;
  height: 300px;
  background: linear-gradient(180deg, transparent, rgba(251,191,36,0.3), transparent);
  flex-shrink: 0;
  margin: 0 50px;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="left">
    <div class="stat">$1,500</div>
    <div class="stat-label">of food wasted per family, <em>every year</em></div>
    <div class="stat-label" style="font-size:20px;color:rgba(255,255,255,0.4);margin-top:4px;">Most of it expired because nobody planned meals around it.</div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="solution">AI meal planning that <em>actually uses</em> what's in your pantry</div>
    <div class="cta">7 days of Pro free</div>
    <div class="url">midespensa.app</div>
  </div>
</div>
</body>
</html>
