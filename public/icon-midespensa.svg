<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="basketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="18"/>

  <!-- ── Basket handle (arc) ── -->
  <path d="M 330 430 Q 330 260 512 260 Q 694 260 694 430"
        fill="none" stroke="url(#basketGrad)" stroke-width="56" stroke-linecap="round"/>

  <!-- ── Basket body ── -->
  <!-- Main basket shape -->
  <path d="M 220 430 L 260 720 Q 265 760 310 760 L 714 760 Q 759 760 764 720 L 804 430 Z"
        fill="url(#basketGrad)" filter="url(#shadow)"/>

  <!-- Basket weave lines (vertical) -->
  <line x1="370" y1="436" x2="345" y2="754" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="440" y1="430" x2="426" y2="758" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="512" y1="430" x2="512" y2="760" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="584" y1="430" x2="598" y2="758" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="654" y1="436" x2="679" y2="754" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>

  <!-- Basket weave lines (horizontal) -->
  <line x1="228" y1="520" x2="796" y2="520" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="240" y1="610" x2="784" y2="610" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>
  <line x1="252" y1="695" x2="772" y2="695" stroke="#16a34a" stroke-width="10" stroke-opacity="0.18"/>

  <!-- Basket rim (top border) -->
  <rect x="210" y="415" width="604" height="52" rx="26" fill="white" opacity="0.95"/>

  <!-- ── Groceries peeking out of basket ── -->
  <!-- Carrot -->
  <ellipse cx="390" cy="385" rx="28" ry="52" fill="#f97316" transform="rotate(-18, 390, 385)"/>
  <path d="M 370 342 Q 355 305 340 295 Q 360 308 375 338" fill="#16a34a"/>
  <path d="M 382 335 Q 372 295 365 280 Q 380 300 388 330" fill="#16a34a"/>

  <!-- Bread / baguette -->
  <ellipse cx="512" cy="368" rx="72" ry="30" fill="#fbbf24" transform="rotate(-8, 512, 368)"/>
  <ellipse cx="512" cy="360" rx="66" ry="22" fill="#fcd34d" transform="rotate(-8, 512, 360)"/>
  <!-- Bread score lines -->
  <line x1="478" y1="352" x2="490" y2="376" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" transform="rotate(-8, 484, 364)"/>
  <line x1="504" y1="348" x2="516" y2="372" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" transform="rotate(-8, 510, 360)"/>
  <line x1="530" y1="348" x2="542" y2="372" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" transform="rotate(-8, 536, 360)"/>

  <!-- Apple -->
  <circle cx="640" cy="378" r="46" fill="#ef4444"/>
  <circle cx="640" cy="378" r="46" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Apple shine -->
  <ellipse cx="622" cy="358" rx="10" ry="14" fill="rgba(255,255,255,0.35)" transform="rotate(-20,622,358)"/>
  <!-- Apple stem -->
  <path d="M 640 333 Q 648 318 658 314" stroke="#15803d" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Apple leaf -->
  <ellipse cx="652" cy="318" rx="12" ry="7" fill="#16a34a" transform="rotate(-30, 652, 318)"/>

  <!-- ── "m" letter subtle watermark at bottom of basket ── -->
  <text x="512" y="730" text-anchor="middle" font-family="'Georgia', serif" font-size="72" font-weight="900"
        fill="#15803d" opacity="0.22" letter-spacing="-2">midespensa</text>

</svg>
