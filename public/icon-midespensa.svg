<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="basketClip">
      <path d="M 292 482 Q 278 620 288 685 Q 298 748 342 758 L 682 758 Q 726 748 736 685 Q 746 620 732 482 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="190" fill="#0f766e"/>

  <!-- ══════════════════════════════════ -->
  <!-- VEGETABLES — white outline        -->
  <!-- ══════════════════════════════════ -->

  <!-- LEFT leafy greens -->
  <g fill="none" stroke="white" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
    <!-- leaf 1 (far left, curves left) -->
    <path d="M 348 478 C 318 430 298 375 312 318 C 328 360 338 418 348 478"/>
    <!-- leaf 2 (center-left) -->
    <path d="M 368 468 C 352 410 352 345 372 285 C 378 335 374 400 368 468"/>
    <!-- leaf 3 (right of left group) -->
    <path d="M 390 465 C 385 405 395 342 420 292 C 415 345 404 408 390 465"/>
  </g>

  <!-- CENTER-LEFT: carrot -->
  <g fill="none" stroke="white" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
    <!-- carrot body -->
    <path d="M 455 480 C 448 520 450 560 460 600 C 468 630 472 650 468 670"/>
    <path d="M 455 480 C 466 520 470 560 472 600 C 474 630 472 650 468 670"/>
    <!-- carrot tip -->
    <path d="M 460 670 C 462 680 468 685 468 670"/>
    <!-- carrot leaves -->
    <path d="M 456 488 C 444 455 430 430 418 415"/>
    <path d="M 460 478 C 456 440 458 405 462 380"/>
    <path d="M 465 482 C 472 448 480 418 488 402"/>
    <path d="M 469 490 C 480 460 490 438 498 428"/>
  </g>

  <!-- CENTER-RIGHT: carrot -->
  <g fill="none" stroke="white" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
    <!-- carrot body -->
    <path d="M 543 480 C 536 520 538 560 548 600 C 556 630 560 650 556 670"/>
    <path d="M 543 480 C 554 520 558 560 560 600 C 562 630 560 650 556 670"/>
    <!-- carrot tip -->
    <path d="M 548 670 C 550 680 556 685 556 670"/>
    <!-- carrot leaves -->
    <path d="M 536 490 C 526 458 520 430 526 410"/>
    <path d="M 542 480 C 540 445 544 412 550 385"/>
    <path d="M 549 482 C 558 450 566 420 572 405"/>
    <path d="M 554 490 C 566 460 576 440 584 430"/>
  </g>

  <!-- RIGHT leafy greens (mirror of left) -->
  <g fill="none" stroke="white" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
    <!-- leaf 1 (far right, curves right) -->
    <path d="M 676 478 C 706 430 726 375 712 318 C 696 360 686 418 676 478"/>
    <!-- leaf 2 -->
    <path d="M 656 468 C 672 410 672 345 652 285 C 646 335 650 400 656 468"/>
    <!-- leaf 3 -->
    <path d="M 634 465 C 639 405 629 342 604 292 C 609 345 620 408 634 465"/>
  </g>

  <!-- ══════════════════════════════════ -->
  <!-- BASKET LATTICE (clipped)          -->
  <!-- ══════════════════════════════════ -->
  <g clip-path="url(#basketClip)" fill="none" stroke="white" stroke-width="16">
    <!-- Diagonal lines: top-left to bottom-right -->
    <line x1="278" y1="500" x2="380" y2="762"/>
    <line x1="310" y1="482" x2="448" y2="762"/>
    <line x1="375" y1="482" x2="515" y2="762"/>
    <line x1="440" y1="482" x2="580" y2="762"/>
    <line x1="505" y1="482" x2="645" y2="762"/>
    <line x1="570" y1="482" x2="710" y2="762"/>
    <line x1="635" y1="482" x2="746" y2="720"/>
    <line x1="700" y1="482" x2="746" y2="578"/>
    <line x1="730" y1="482" x2="746" y2="530"/>

    <!-- Diagonal lines: top-right to bottom-left -->
    <line x1="746" y1="500" x2="644" y2="762"/>
    <line x1="714" y1="482" x2="576" y2="762"/>
    <line x1="649" y1="482" x2="509" y2="762"/>
    <line x1="584" y1="482" x2="444" y2="762"/>
    <line x1="519" y1="482" x2="379" y2="762"/>
    <line x1="454" y1="482" x2="314" y2="762"/>
    <line x1="389" y1="482" x2="278" y2="720"/>
    <line x1="324" y1="482" x2="278" y2="578"/>
    <line x1="294" y1="482" x2="278" y2="530"/>
  </g>

  <!-- ══════════════════════════════════ -->
  <!-- BASKET OUTLINE                    -->
  <!-- ══════════════════════════════════ -->
  <path d="M 292 482 Q 278 620 288 685 Q 298 748 342 758 L 682 758 Q 726 748 736 685 Q 746 620 732 482 Z"
        fill="none" stroke="white" stroke-width="22" stroke-linejoin="round"/>

  <!-- Basket rim (sits on top, covers lattice overflow) -->
  <rect x="280" y="463" width="464" height="42" rx="21"
        fill="#0f766e" stroke="white" stroke-width="22"/>

  <!-- ══════════════════════════════════ -->
  <!-- TEXT                              -->
  <!-- ══════════════════════════════════ -->
  <text x="512" y="895"
        text-anchor="middle"
        font-family="'Arial Black','Arial Bold','Arial',sans-serif"
        font-size="82"
        font-weight="900"
        fill="white"
        letter-spacing="7">MIDESPENSA</text>
</svg>
