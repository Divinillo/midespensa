name: Build Android TWA

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses & install build tools
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-twa/**/*.gradle', 'android-twa/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download Gradle wrapper jar
        working-directory: android-twa
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "✅ gradle-wrapper.jar: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"
          chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-twa/midespensa.keystore
          echo "✅ Keystore decodificado ($(wc -c < android-twa/midespensa.keystore) bytes)"

      - name: Build release AAB (Google Play)
        working-directory: android-twa
        env:
          KEYSTORE_PATH: midespensa.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: Build release APK (pruebas internas)
        working-directory: android-twa
        env:
          KEYSTORE_PATH: midespensa.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload AAB → sube esto a Google Play
        uses: actions/upload-artifact@v4
        with:
          name: MiDespensa-release.aab
          path: android-twa/app/build/outputs/bundle/release/app-release.aab
          retention-days: 60

      - name: Upload APK → instala para probar
        uses: actions/upload-artifact@v4
        with:
          name: MiDespensa-release.apk
          path: android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 60
